hidden_size: 128
num_layers: 4
num_heads: 4
dropout: 0.1
feedforward_dim: 512
# A cap on how many past chunks (calendar months of a player's pitches) feed
# the career encoder -- 36 months is roughly three years for a player active
# every month of the season. Not a hard architectural limit (ChunkTimeEncoding
# is continuous, not a lookup table), just how far back a caller should look
# when building a player's chunk sequence.
max_chunks: 36
